<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Admin</title>

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />
  <link rel="stylesheet" href="style.css" />

  <style>
    body {
      background: #f8f9fa;
    }

    .admin-card {
      border: 0;
      border-radius: 14px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .collection-list .card {
      border-radius: 12px;
    }

    .thumb-preview {
      max-height: 80px;
      width: auto;
      border-radius: 8px;
      border: 1px solid #dee2e6;
      padding: 4px;
      background: #fff;
      margin-top: 8px;
    }

    .sticky-actions {
      position: sticky;
      bottom: 0;
      background: white;
      padding-top: 12px;
    }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
      <div>
        <h1 class="mb-1">Portfolio Admin</h1>
        <p class="text-muted mb-0">Manage portfolio, about, skills, interests, knowledgebase, relations, and resume.</p>
      </div>
      <button id="logout-btn" class="btn btn-outline-danger d-none">
        <i class="bi bi-box-arrow-right"></i> Logout
      </button>
    </div>

    <div id="alert-container"></div>

    <div id="login-card" class="card admin-card shadow-sm">
      <div class="card-body p-4">
        <h2 class="h4 mb-3">Login</h2>
        <form id="login-form" class="row g-3">
          <div class="col-12 col-md-6">
            <label for="email" class="form-label">Email address</label>
            <input type="email" class="form-control" id="email" placeholder="Enter email" required />
          </div>
          <div class="col-12 col-md-6">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Password" required />
          </div>
          <div class="col-12">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-lock"></i> Login
            </button>
          </div>
        </form>
      </div>
    </div>

    <div id="admin-content" class="d-none">
      <div class="row g-4 mt-1">
        <div class="col-12">
          <div class="card admin-card shadow-sm">
            <div class="card-body p-4">
              <div class="section-title mb-3">
                <h2 class="h4 mb-0">Resume</h2>
              </div>
              <div class="row g-3 align-items-end">
                <div class="col-12 col-md-8">
                  <label for="resume-upload" class="form-label">Upload resume PDF</label>
                  <input type="file" id="resume-upload" class="form-control" accept=".pdf,application/pdf" />
                </div>
                <div class="col-12 col-md-4">
                  <button class="btn btn-success w-100" id="upload-resume">
                    <i class="bi bi-upload"></i> Upload Resume
                  </button>
                </div>
              </div>
              <div id="resume-status" class="small text-muted mt-2"></div>
            </div>
          </div>
        </div>

        <div class="col-12">
          <div class="card admin-card shadow-sm">
            <div class="card-body p-4">
              <div class="section-title mb-3">
                <h2 class="h4 mb-0">Manage Portfolio</h2>
              </div>

              <form class="collection-form" data-collection="portfolio">
                <input type="hidden" name="docId" />
                <div class="row g-3">
                  <div class="col-12 col-md-6">
                    <label class="form-label">Title</label>
                    <input type="text" name="title" class="form-control" required />
                  </div>
                  <div class="col-12 col-md-6">
                    <label class="form-label">Live link</label>
                    <input type="url" name="link" class="form-control" placeholder="https://..." required />
                  </div>
                  <div class="col-12">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="4" required></textarea>
                  </div>
                  <div class="col-12">
                    <label class="form-label">GitHub link</label>
                    <input type="url" name="code" class="form-control" placeholder="https://github.com/..." required />
                  </div>
                </div>

                <div class="sticky-actions mt-3 d-flex gap-2">
                  <button type="submit" class="btn btn-primary submit-btn">Add Portfolio Item</button>
                  <button type="button" class="btn btn-outline-secondary cancel-edit d-none">Cancel Edit</button>
                </div>
              </form>

              <hr class="my-4" />
              <div id="portfolio-list" class="collection-list"></div>
            </div>
          </div>
        </div>

        <div class="col-12">
          <div class="card admin-card shadow-sm">
            <div class="card-body p-4">
              <h2 class="h4 mb-3">Manage About Me</h2>

              <form class="collection-form" data-collection="about">
                <input type="hidden" name="docId" />
                <div class="row g-3">
                  <div class="col-12 col-md-6">
                    <label class="form-label">Title</label>
                    <input type="text" name="title" class="form-control" required />
                  </div>
                  <div class="col-12">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="4" required></textarea>
                  </div>
                </div>

                <div class="sticky-actions mt-3 d-flex gap-2">
                  <button type="submit" class="btn btn-primary submit-btn">Add About Item</button>
                  <button type="button" class="btn btn-outline-secondary cancel-edit d-none">Cancel Edit</button>
                </div>
              </form>

              <hr class="my-4" />
              <div id="about-list" class="collection-list"></div>
            </div>
          </div>
        </div>

        <div class="col-12">
          <div class="card admin-card shadow-sm">
            <div class="card-body p-4">
              <h2 class="h4 mb-3">Manage Skills</h2>

              <form class="collection-form" data-collection="skills">
                <input type="hidden" name="docId" />
                <div class="row g-3">
                  <div class="col-12 col-md-6">
                    <label class="form-label">Skill name</label>
                    <input type="text" name="name" class="form-control" required />
                  </div>
                </div>

                <div class="sticky-actions mt-3 d-flex gap-2">
                  <button type="submit" class="btn btn-primary submit-btn">Add Skill</button>
                  <button type="button" class="btn btn-outline-secondary cancel-edit d-none">Cancel Edit</button>
                </div>
              </form>

              <hr class="my-4" />
              <div id="skills-list" class="collection-list"></div>
            </div>
          </div>
        </div>

        <div class="col-12">
          <div class="card admin-card shadow-sm">
            <div class="card-body p-4">
              <h2 class="h4 mb-3">Manage Interests</h2>

              <form class="collection-form" data-collection="interests">
                <input type="hidden" name="docId" />
                <div class="row g-3">
                  <div class="col-12 col-md-6">
                    <label class="form-label">Interest name</label>
                    <input type="text" name="name" class="form-control" required />
                  </div>
                </div>

                <div class="sticky-actions mt-3 d-flex gap-2">
                  <button type="submit" class="btn btn-primary submit-btn">Add Interest</button>
                  <button type="button" class="btn btn-outline-secondary cancel-edit d-none">Cancel Edit</button>
                </div>
              </form>

              <hr class="my-4" />
              <div id="interests-list" class="collection-list"></div>
            </div>
          </div>
        </div>

        <div class="col-12">
          <div class="card admin-card shadow-sm">
            <div class="card-body p-4">
              <h2 class="h4 mb-3">Manage Knowledgebase</h2>

              <form class="collection-form" data-collection="knowledgebase">
                <input type="hidden" name="docId" />
                <div class="row g-3">
                  <div class="col-12 col-md-6">
                    <label class="form-label">Name</label>
                    <input type="text" name="name" class="form-control" required />
                  </div>
                  <div class="col-12 col-md-6">
                    <label class="form-label">Link</label>
                    <input type="url" name="link" class="form-control" placeholder="https://..." required />
                  </div>
                </div>

                <div class="sticky-actions mt-3 d-flex gap-2">
                  <button type="submit" class="btn btn-primary submit-btn">Add Knowledgebase Item</button>
                  <button type="button" class="btn btn-outline-secondary cancel-edit d-none">Cancel Edit</button>
                </div>
              </form>

              <hr class="my-4" />
              <div id="knowledgebase-list" class="collection-list"></div>
            </div>
          </div>
        </div>

        <div class="col-12">
          <div class="card admin-card shadow-sm">
            <div class="card-body p-4">
              <h2 class="h4 mb-3">Manage Relations</h2>

              <form class="collection-form" data-collection="relations">
                <input type="hidden" name="docId" />
                <div class="row g-3">
                  <div class="col-12 col-md-4">
                    <label class="form-label">Name</label>
                    <input type="text" name="name" class="form-control" required />
                  </div>
                  <div class="col-12 col-md-4">
                    <label class="form-label">Website link</label>
                    <input type="url" name="link" class="form-control" placeholder="https://..." required />
                  </div>
                  <div class="col-12 col-md-4">
                    <label class="form-label">Image URL / path</label>
                    <input type="text" name="path" class="form-control" placeholder="https://... or /image.png" required />
                  </div>
                </div>

                <div class="sticky-actions mt-3 d-flex gap-2">
                  <button type="submit" class="btn btn-primary submit-btn">Add Relation</button>
                  <button type="button" class="btn btn-outline-secondary cancel-edit d-none">Cancel Edit</button>
                </div>
              </form>

              <hr class="my-4" />
              <div id="relations-list" class="collection-list"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-storage.js"></script>
  <script src="admin.js"></script>
</body>
</html>
